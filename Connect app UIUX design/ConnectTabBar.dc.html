<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:center;justify-content:space-between;background:#FFFFFF;border-top:1px solid #ECE7DB;padding:9px 18px 12px;font-family:'Hanken Grotesk',system-ui,sans-serif;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:5px;width:56px;">
    <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="{{ homeC }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5.5 9.5V20a1 1 0 0 0 1 1H10v-5h4v5h3.5a1 1 0 0 0 1-1V9.5"/></svg>
    <span style="font-size:10.5px;font-weight:{{ homeW }};color:{{ homeC }};letter-spacing:.1px;">Home</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:5px;width:56px;">
    <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="{{ cardC }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5.5" width="18" height="13" rx="2.4"/><path d="M7 10h4M7 14h7"/></svg>
    <span style="font-size:10.5px;font-weight:{{ cardW }};color:{{ cardC }};letter-spacing:.1px;">Card</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;width:64px;">
    <div style="width:52px;height:52px;border-radius:50%;background:#0E9E88;display:flex;align-items:center;justify-content:center;margin-top:-26px;box-shadow:0 8px 20px rgba(14,158,136,.42);border:4px solid #FFFFFF;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="2"/><path d="M8.6 8.6a4.8 4.8 0 0 0 0 6.8M5.9 5.9a8.6 8.6 0 0 0 0 12.2M15.4 8.6a4.8 4.8 0 0 1 0 6.8M18.1 5.9a8.6 8.6 0 0 1 0 12.2"/></svg>
    </div>
    <span style="font-size:10.5px;font-weight:600;color:#0E9E88;letter-spacing:.1px;margin-top:2px;">Share</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:5px;width:56px;">
    <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="{{ askC }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.2l1.7 4.9 4.9 1.7-4.9 1.7L12 16.4l-1.7-4.9L5.4 9.8l4.9-1.7z"/><path d="M18.5 15.5l.6 1.7 1.7.6-1.7.6-.6 1.7-.6-1.7-1.7-.6 1.7-.6z"/></svg>
    <span style="font-size:10.5px;font-weight:{{ askW }};color:{{ askC }};letter-spacing:.1px;">Ask</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:5px;width:56px;">
    <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="{{ contactsC }}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.2a3.2 3.2 0 0 1 0 5.9M17.5 20a5.5 5.5 0 0 0-2.4-4.5"/></svg>
    <span style="font-size:10.5px;font-weight:{{ contactsW }};color:{{ contactsC }};letter-spacing:.1px;">Contacts</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:412,&quot;height&quot;:72},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;card&quot;,&quot;ask&quot;,&quot;contacts&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const a = this.props.active || 'home';
    const on = '#0E9E88', off = '#9B9E93';
    const c = k => (a === k ? on : off);
    const w = k => (a === k ? 700 : 500);
    return {
      homeC: c('home'), cardC: c('card'), askC: c('ask'), contactsC: c('contacts'),
      homeW: w('home'), cardW: w('card'), askW: w('ask'), contactsW: w('contacts'),
    };
  }
}
</script>
</body>
</html>
